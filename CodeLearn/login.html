<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeLearn - Login</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background-color: #0F172A;
  color: #F8FAFC;
}

/* HEADER */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background-color: #1E293B;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 35px;
}

.logo span {
  font-family: 'Poppins', sans-serif;
  font-size: 20px;
  font-weight: 600;
}

nav ul {
  list-style: none;
  display: flex;
}

nav ul li a {
  color: #94A3B8;
  margin-left: 25px;
  text-decoration: none;
  transition: 0.3s;
}

nav ul li a:hover {
  color: #6366F1;
}

/* MAIN */
main {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
}

/* CARD */
.card {
  background-color: #1E293B;
  padding: 35px;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* HEADINGS */
h1 {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: #6366F1;
  margin-bottom: 20px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

label {
  font-size: 14px;
  color: #94A3B8;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background-color: #0F172A;
  color: #F8FAFC;
}

input:focus {
  outline: 2px solid #6366F1;
}

/* BUTTON */
button {
  background-color: #6366F1;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #4F46E5;
}

/* TEXT */
.message {
  text-align: center;
  margin-top: 10px;
}

.error { color: #EF4444; }
.success { color: #22C55E; }

.switch-form {
  text-align: center;
  margin-top: 10px;
}

.switch-form a {
  color: #6366F1;
  text-decoration: none;
}

/* PROFILE */
#profileSection {
  text-align: center;
}

#profileAvatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin: 15px 0;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background-color: #1E293B;
  color: #94A3B8;
  margin-top: 40px;
}
</style>
</head>

<body>

<header class="toolbar">
  <div class="logo">
    <img src="logo.png">
    <span>CodeLearn</span>
  </div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>
</header>

<main>

<div class="card">

<!-- PROFILE -->
<div id="profileSection" style="display:none;">
  <h1>Welcome 👋</h1>
  <h2 id="profileUsername"></h2>
  <img id="profileAvatar" src="avatar1.png">
  <button onclick="handleLogout()">Logout</button>

  <h3 style="margin-top:20px;">Choose Avatar</h3>
  <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
    <img src="avatar1.png" onclick="changeAvatar('avatar1.png')" style="width:50px;border-radius:50%;cursor:pointer;">
    <img src="avatar2.png" onclick="changeAvatar('avatar2.png')" style="width:50px;border-radius:50%;cursor:pointer;">
    <img src="avatar3.png" onclick="changeAvatar('avatar3.png')" style="width:50px;border-radius:50%;cursor:pointer;">
  </div>
</div>

<!-- LOGIN -->
<div id="loginForm">
  <h1>Login</h1>
  <form onsubmit="return handleLogin(event)">
    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <button type="submit">Login</button>
  </form>
  <p class="message" id="loginMessage"></p>

  <div class="switch-form">
    <p>Don't have an account? <a href="#" onclick="toggleForms()">Sign up</a></p>
  </div>
</div>

<!-- SIGNUP -->
<div id="signupForm" style="display:none;">
  <h1>Sign Up</h1>
  <form onsubmit="return handleSignup(event)">
    <label>Username</label>
    <input type="text" id="newUsername" required>

    <label>Password</label>
    <input type="password" id="newPassword" required>

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" required>

    <button type="submit">Sign Up</button>
  </form>
  <p class="message" id="signupMessage"></p>

  <div class="switch-form">
    <p>Already have an account? <a href="#" onclick="toggleForms()">Login</a></p>
  </div>
</div>

</div>
</main>

<footer>
  <p>&copy; 2025 CodeLearn. All rights reserved.</p>
</footer>

<script>
function toggleForms() {
  const login = document.getElementById('loginForm');
  const signup = document.getElementById('signupForm');
  login.style.display = login.style.display === 'none' ? 'block' : 'none';
  signup.style.display = signup.style.display === 'none' ? 'block' : 'none';
}

/* KEEP YOUR EXISTING JS (NO CHANGE NEEDED BELOW) */
</script>

</body>
</html>
